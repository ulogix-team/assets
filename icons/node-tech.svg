<svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <circle cx="30" cy="30" r="28" fill="url(#nodeGrad)"/>
  <circle cx="30" cy="30" r="20" stroke="#7C3AED" stroke-width="1" fill="none">
    <animate attributeName="r" values="20;22;20" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="30" r="12" stroke="#a855f7" stroke-width="1.5" fill="none"/>
  <circle cx="30" cy="30" r="4" fill="#a855f7"/>
  <!-- Connection nodes -->
  <circle cx="30" cy="8" r="3" fill="#7C3AED"><animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0s" repeatCount="indefinite"/></circle>
  <circle cx="30" cy="52" r="3" fill="#7C3AED"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0s" repeatCount="indefinite"/></circle>
  <circle cx="8" cy="30" r="3" fill="#7C3AED"><animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
  <circle cx="52" cy="30" r="3" fill="#7C3AED"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
  <!-- Connector lines -->
  <line x1="30" y1="11" x2="30" y2="18" stroke="#7C3AED" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="42" x2="30" y2="49" stroke="#7C3AED" stroke-width="1" opacity="0.5"/>
  <line x1="11" y1="30" x2="18" y2="30" stroke="#7C3AED" stroke-width="1" opacity="0.5"/>
  <line x1="42" y1="30" x2="49" y2="30" stroke="#7C3AED" stroke-width="1" opacity="0.5"/>
</svg>
