<svg width="800" height="20" viewBox="0 0 800 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="div1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#7C3AED;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#7C3AED;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Main line -->
  <rect x="0" y="9" width="800" height="1" fill="url(#div1)"/>
  <!-- Center diamond -->
  <rect x="396" y="6" width="8" height="8" fill="#7C3AED" transform="rotate(45 400 10)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Side dots -->
  <circle cx="150" cy="10" r="2" fill="#7C3AED" opacity="0.6"/>
  <circle cx="650" cy="10" r="2" fill="#7C3AED" opacity="0.6"/>
  <circle cx="300" cy="10" r="1.5" fill="#a855f7" opacity="0.4"/>
  <circle cx="500" cy="10" r="1.5" fill="#a855f7" opacity="0.4"/>
</svg>
