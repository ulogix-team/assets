<svg width="800" height="20" viewBox="0 0 800 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Horizontal rule, white, subtle -->
  <line x1="0" y1="10" x2="800" y2="10" stroke="white" stroke-width="0.6" opacity="0.18"/>

  <!-- Center diamond, slow pulse -->
  <rect x="396.5" y="6.5" width="7" height="7" fill="white" opacity="0"
        transform="rotate(45 400 10)">
    <animate attributeName="opacity" values="0;0.45;0.45;0" dur="4s" keyTimes="0;0.3;0.7;1" repeatCount="indefinite"/>
  </rect>

  <!-- Traveling dot: moves left to right along the line -->
  <circle cx="0" cy="10" r="1.5" fill="white" opacity="0.6">
    <animateMotion dur="6s" repeatCount="indefinite" path="M0,0 L800,0"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" dur="6s" keyTimes="0;0.05;0.95;1" repeatCount="indefinite"/>
  </circle>
</svg>