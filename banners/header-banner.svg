<svg width="800" height="120" viewBox="0 0 800 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#070213"/>
      <stop offset="50%" style="stop-color:#0e0525"/>
      <stop offset="100%" style="stop-color:#070213"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#7C3AED;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="120" fill="url(#bgGrad)" rx="8"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#7C3AED" stroke-width="0.5">
    <line x1="0" y1="20" x2="800" y2="20"/>
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="100" y1="0" x2="100" y2="120"/>
    <line x1="200" y1="0" x2="200" y2="120"/>
    <line x1="300" y1="0" x2="300" y2="120"/>
    <line x1="400" y1="0" x2="400" y2="120"/>
    <line x1="500" y1="0" x2="500" y2="120"/>
    <line x1="600" y1="0" x2="600" y2="120"/>
    <line x1="700" y1="0" x2="700" y2="120"/>
  </g>

  <!-- Animated scan line -->
  <rect x="0" y="0" width="200" height="120" fill="url(#glowGrad)" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" from="-200 0" to="800 0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom accent line animated -->
  <rect x="0" y="116" width="800" height="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Top accent line -->
  <rect x="0" y="2" width="800" height="1" fill="url(#lineGrad)" opacity="0.5"/>

  <!-- U Icon mark -->
  <g transform="translate(40, 20) scale(0.95)" filter="url(#glow)">
    <path d="M33.5 40.7L33.49 42.98C33.49 43.13 33.48 43.19 33.47 43.25C33.44 43.37 33.4 43.48 33.34 43.58C33.32 43.6 33.3 43.63 33.28 43.65C33.21 43.73 33.13 43.81 33.04 43.86L25.81 47.93C25.7 47.99 25.58 48.02 25.46 48.02C25.34 48.02 25.22 47.99 25.11 47.93L17.9 43.88C17.79 43.81 17.72 43.74 17.65 43.65C17.54 43.49 17.5 43.37 17.47 43.25C17.46 43.19 17.44 43.13 17.44 43.07V40.7H17.43V33.69C17.43 33.04 17.13 32.44 16.64 32.15L11.51 29.13C10.49 28.54 9.26 29.33 9.26 30.58V43.54C9.26 43.7 9.27 43.92 9.27 44.03C9.27 45.18 9.27 46.33 9.28 47.48C9.28 48.13 9.28 48.46 9.28 48.46C9.3 48.62 9.34 48.98 9.38 49.11C9.42 49.28 9.5 49.43 9.57 49.59C9.62 49.72 9.65 49.77 9.72 49.87C9.97 50.24 10.29 50.56 10.71 50.8C14.09 52.71 17.5 54.6 20.9 56.49C22.5 57.4 24.09 58.31 25.69 59.21C26.04 59.34 26.39 59.3 26.73 59.21C28.32 58.31 29.92 57.4 31.51 56.49C34.91 54.6 38.31 52.7 41.71 50.8C42.12 50.56 42.44 50.24 42.69 49.87C42.83 49.68 42.86 49.59 42.93 49.43C43.05 49.11 43.1 48.84 43.1 48.7C43.13 48.46 43.13 48.46 43.13 47.47C43.14 45.17 43.14 44.02 43.14 43.7C43.15 43.54V30.58C43.15 29.33 41.92 28.54 40.9 29.12L35.77 32.14C35.28 32.43 34.98 33.03 34.98 33.68V40.7H33.5Z" fill="#a855f7"/>
    <path d="M9.71 26.47L17.09 30.64C17.68 30.97 18.38 30.52 18.38 29.82V21.93C18.38 21.28 17.85 20.76 17.2 20.76H9.82C9.17 20.76 8.64 21.28 8.64 21.93V25.82C8.64 26.24 8.87 26.63 9.24 26.82" fill="#a855f7"/>
    <path d="M41.78 20.76H34.4C33.75 20.76 33.22 21.28 33.22 21.93V30.64C33.22 31.36 34 31.81 34.59 31.46L41.97 27.16C42.31 26.96 42.52 26.6 42.52 26.21V21.93C42.52 21.28 41.99 20.76 41.34 20.76" fill="#a855f7"/>
  </g>

  <!-- ULOGIX wordmark -->
  <g filter="url(#textGlow)">
    <text x="110" y="66" font-family="'Courier New', monospace" font-size="36" font-weight="700" fill="white" letter-spacing="4">
      ULOGIX
    </text>
    <text x="110" y="85" font-family="'Courier New', monospace" font-size="10" fill="#7C3AED" letter-spacing="8" opacity="0.9">
      AUTOMATIZACIÓN DE MANUFACTURA
    </text>
  </g>

  <!-- Corner decorations -->
  <g stroke="#7C3AED" stroke-width="1.5" opacity="0.6">
    <!-- top-left -->
    <path d="M10 10 L10 25 M10 10 L25 10"/>
    <!-- top-right -->
    <path d="M790 10 L790 25 M790 10 L775 10"/>
    <!-- bottom-left -->
    <path d="M10 110 L10 95 M10 110 L25 110"/>
    <!-- bottom-right -->
    <path d="M790 110 L790 95 M790 110 L775 110"/>
  </g>

  <!-- Pulse dots -->
  <circle cx="760" cy="30" r="3" fill="#7C3AED">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="90" r="3" fill="#a855f7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
